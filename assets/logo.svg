<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="carrel logo: a desk lamp over a lit page, forming the letter C">
  <!-- carrel mark — hand-authored. The C is a study carrel in profile:
       top arm = lamp arm, left stroke = partition, bottom arm = desk surface.
       Palette: Ink #14100A · Lamplight #F2A93C · Brass #B07C24 · Paper #F2EADA -->
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F2A93C" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#F2A93C" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#F2A93C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#14100A"/>
  <!-- lamplight glow -->
  <circle cx="316" cy="132" r="130" fill="url(#glow)"/>
  <!-- light cone falling on the desk -->
  <path d="M 316 150 L 252 352 L 396 352 Z" fill="#F2A93C" opacity="0.16"/>
  <!-- the C-desk -->
  <path d="M 316 132 L 182 132 Q 122 132 122 192 L 122 320 Q 122 380 182 380 L 396 380"
        fill="none" stroke="#F2A93C" stroke-width="56"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- lit page on the desk -->
  <rect x="276" y="316" width="104" height="36" rx="8" fill="#F2EADA"/>
  <path d="M 292 328 L 364 328 M 292 340 L 348 340" stroke="#B07C24" stroke-width="5"
        stroke-linecap="round" opacity="0.6"/>
  <!-- lamp bulb -->
  <circle cx="316" cy="132" r="40" fill="#F2A93C"/>
  <circle cx="316" cy="132" r="15" fill="#F2EADA" opacity="0.9"/>
</svg>
